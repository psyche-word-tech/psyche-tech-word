<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>启动画面预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    .logo {
      width: 120px;
      height: auto;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: #000000;
      color: #ffffff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
    }
    .back-btn:hover {
      background-color: #333333;
    }
    .hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #999999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.close()">← 返回</button>
  <img class="logo" src="splash-icon.png?t=05240925" alt="Logo" />
  <p class="hint">点击返回按钮关闭</p>
</body>
</html>
