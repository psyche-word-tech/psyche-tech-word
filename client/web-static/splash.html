<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>启动画面预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .splash-logo {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background-color: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .back-btn:active {
      opacity: 0.8;
    }
    .hint {
      position: fixed;
      bottom: 20px;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.close()">← 返回</button>
  <img src="splash-icon.png" alt="Logo" class="splash-logo">
  <p class="hint">点击返回按钮关闭</p>
</body>
</html>
