<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>单词记</title>
    <style>
      html, body { height: 100%; margin: 0; padding: 0; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
      
      /* Splash Preview Overlay */
      #splash-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      #splash-overlay.active { display: flex; }
      
      .splash-icon {
        width: 200px;
        height: 200px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .splash-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        background: #333;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        z-index: 10000;
      }
      
      .splash-btn:hover { background: #555; }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      
      /* Butterfly SVG Styles */
      .butterfly {
        position: relative;
        width: 200px;
        height: 200px;
      }
      .wing {
        position: absolute;
        background-color: #000000;
      }
      .wing-left-top {
        width: 100px; height: 120px;
        top: 10px; left: 0;
        border-radius: 50% 0 50% 50%;
        transform: rotate(-20deg);
        transform-origin: right bottom;
      }
      .wing-left-bottom {
        width: 80px; height: 100px;
        bottom: 30px; left: 15px;
        border-radius: 50% 0 50% 50%;
        transform: rotate(30deg);
        transform-origin: right top;
      }
      .wing-right-top {
        width: 100px; height: 120px;
        top: 10px; right: 0;
        border-radius: 0 50% 50% 50%;
        transform: rotate(20deg);
        transform-origin: left bottom;
      }
      .wing-right-bottom {
        width: 80px; height: 100px;
        bottom: 30px; right: 15px;
        border-radius: 0 50% 50% 50%;
        transform: rotate(-30deg);
        transform-origin: left top;
      }
      .center {
        position: absolute;
        width: 14px; height: 50px;
        background-color: #ffffff;
        border-radius: 7px;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
    <link rel="preload" href="/_expo/static/css/global-896935b68f3ea002a3405c7c47b758e9.css" as="style"><link rel="stylesheet" href="/_expo/static/css/global-896935b68f3ea002a3405c7c47b758e9.css"><link rel="icon" href="/favicon.ico" /></head>

  <body>
    <!-- Splash Preview Overlay -->
    <div id="splash-overlay">
      <div class="butterfly">
        <div class="wing wing-left-top"></div>
        <div class="wing wing-left-bottom"></div>
        <div class="wing wing-right-top"></div>
        <div class="wing wing-right-bottom"></div>
        <div class="center"></div>
      </div>
    </div>
    
    <!-- Splash Preview Button -->
    <button class="splash-btn" onclick="toggleSplash()">预览启动画面</button>

    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
    <script src="/_expo/static/js/web/entry-52aa4168dcb41b4e325563ede407e1b8.js" defer></script>
    
    <script>
      function toggleSplash() {
        const overlay = document.getElementById('splash-overlay');
        overlay.classList.toggle('active');
        if (overlay.classList.contains('active')) {
          document.querySelector('.splash-btn').textContent = '关闭启动画面';
        } else {
          document.querySelector('.splash-btn').textContent = '预览启动画面';
        }
      }
    </script>
  </body>
</html>
