<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>单词记</title>
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
      /* Splash preview styles */
      #splash-preview {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        cursor: pointer;
      }
      #splash-preview.active { display: flex; }
      .butterfly {
        position: relative;
        width: 240px;
        height: 280px;
      }
      .wing {
        position: absolute;
        background-color: #000000;
      }
      .wing-left-top { width: 120px; height: 140px; top: 0; left: 0; border-radius: 50% 0 50% 50%; transform: rotate(-20deg); transform-origin: right bottom; }
      .wing-left-bottom { width: 100px; height: 120px; bottom: 40px; left: 20px; border-radius: 50% 0 50% 50%; transform: rotate(30deg); transform-origin: right top; }
      .wing-right-top { width: 120px; height: 140px; top: 0; right: 0; border-radius: 0 50% 50% 50%; transform: rotate(20deg); transform-origin: left bottom; }
      .wing-right-bottom { width: 100px; height: 120px; bottom: 40px; right: 20px; border-radius: 0 50% 50% 50%; transform: rotate(-30deg); transform-origin: left top; }
      .center { position: absolute; width: 16px; height: 50px; background-color: #ffffff; border-radius: 8px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
      .splash-hint {
        margin-top: 40px;
        color: #999;
        font-size: 14px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      /* Toggle button */
      #splash-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 10px 20px;
        background-color: #000000;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        z-index: 10000;
      }
      #splash-toggle:hover { background-color: #333333; }
    </style>
    <link rel="preload" href="/_expo/static/css/global-896935b68f3ea002a3405c7c47b758e9.css" as="style">
    <link rel="stylesheet" href="/_expo/static/css/global-896935b68f3ea002a3405c7c47b758e9.css">
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Splash Preview -->
    <div id="splash-preview">
      <div class="butterfly">
        <div class="wing wing-left-top"></div>
        <div class="wing wing-left-bottom"></div>
        <div class="wing wing-right-top"></div>
        <div class="wing wing-right-bottom"></div>
        <div class="center"></div>
      </div>
      <p class="splash-hint">点击任意处关闭</p>
    </div>
    <button id="splash-toggle">预览启动画面</button>
    <script>
      const splash = document.getElementById('splash-preview');
      const toggle = document.getElementById('splash-toggle');
      let isShown = false;
      
      toggle.addEventListener('click', () => {
        if (isShown) {
          splash.classList.remove('active');
          toggle.textContent = '预览启动画面';
        } else {
          splash.classList.add('active');
          toggle.textContent = '关闭启动画面';
        }
        isShown = !isShown;
      });
      
      splash.addEventListener('click', () => {
        splash.classList.remove('active');
        toggle.textContent = '预览启动画面';
        isShown = false;
      });
    </script>
    <script src="/_expo/static/js/web/entry-52aa4168dcb41b4e325563ede407e1b8.js" defer></script>
  </body>
</html>
